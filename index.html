<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TransPort</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TransPort">
<meta name="theme-color" content="#378ADD">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f1f0eb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d98;
  --border:#e0dfd9;--border2:#c8c7c0;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --radius:8px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:210px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:700;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text2);margin-top:2px}
.nav-sec{font-size:10px;color:var(--text3);padding:12px 16px 4px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.nav{display:flex;align-items:center;gap:9px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;transition:background .15s;user-select:none}
.nav:hover{background:var(--bg2);color:var(--text)}
.nav.active{color:var(--blue-text);background:var(--blue-bg);border-left-color:var(--blue);font-weight:500}
.nav svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.topbar h2{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px;background:var(--bg3)}
.btn{font-size:12px;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--bg);color:var(--text);transition:background .15s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#185FA5}
.btn-danger{color:var(--red-text);border-color:#f09595}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:4px 10px;font-size:11px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-val{font-size:24px;font-weight:600}
.metric-val.blue{color:var(--blue-text)}
.metric-val.green{color:var(--green-text)}
.metric-val.amber{color:var(--amber-text)}
.card{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:16px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:var(--text2);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg2);cursor:pointer}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.b-gray{background:var(--bg2);color:var(--text2)}
.filter-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-row input,.filter-row select{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:600}
.modal-body{padding:20px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12px;font-weight:500;color:var(--text2)}
.field input,.field select,.field textarea{padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:100%}
.field textarea{resize:vertical;min-height:72px}
.driver-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.driver-row:last-child{border-bottom:none}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--blue-bg);color:var(--blue-text);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast{position:fixed;bottom:24px;right:24px;background:#222;color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{background:var(--red-text)}
.empty{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.sync-indicator{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green-text);margin-right:5px}
.sync-indicator.offline{background:var(--amber-text)}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-row{padding:10px 14px;border-bottom:1px solid var(--border)}
.detail-row.full{grid-column:1/-1}
.detail-label{font-size:11px;color:var(--text2);margin-bottom:3px}
.detail-val{font-size:13px;font-weight:500}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg3)}
.login-box{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:40px;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-box h2{font-size:20px;font-weight:700;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:24px}
/* Kalkulator */
.kal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:8px}
.kal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.kal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text2);padding:4px 0}
.kal-day{min-height:75px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:4px;cursor:pointer;transition:background .15s}
.kal-day:hover{background:var(--blue-bg)}
.kal-day.today{border-color:var(--blue);border-width:2px}
.kal-day.other-month{background:var(--bg3);opacity:.6}
.kal-day-num{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:2px}
.kal-day.today .kal-day-num{background:var(--blue);color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px}
.kal-event{font-size:10px;padding:1px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kal-event.typ-notatka{background:var(--blue-bg);color:var(--blue-text)}
.kal-event.typ-zaladunek{background:var(--green-bg);color:var(--green-text)}
.kal-event.typ-dostawa{background:var(--amber-bg);color:var(--amber-text)}
.kal-event.typ-serwis{background:var(--red-bg);color:var(--red-text)}
/* Mobile */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:5px}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
.sidebar-overlay.open{display:block}
@media(max-width:900px){
  .app{flex-direction:column;height:auto;min-height:100vh;overflow:visible}
  .sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:50;width:210px;transition:left .25s;overflow-y:auto}
  .sidebar.open{left:0}
  .main{width:100%;overflow:visible;display:block}
  .content{overflow-y:visible;padding:12px;min-height:calc(100vh - 60px)}
  .topbar{padding:10px 14px;position:sticky;top:0;z-index:10}
  .hamburger{display:flex!important}
  .metrics{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .metric-val{font-size:18px}
  .two-col{grid-template-columns:1fr}
  table{font-size:11px}
  th,td{padding:6px 6px}
  .modal{width:100%;max-width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;max-height:90vh;overflow-y:auto}
  .modal-overlay{padding:0;align-items:flex-end}
  .modal-body{grid-template-columns:1fr;padding:14px;gap:10px}
  .field.full{grid-column:1}
  .btn{padding:6px 10px;font-size:11px}
  .kal-day{min-height:50px}
  .kal-event{display:none}
  .kal-day-num{font-size:12px}
  #sync-text{display:none}
}
@media(max-width:500px){
  .metrics{grid-template-columns:1fr 1fr}
  .content{padding:10px}
}
</style>
</head>
<body>

<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <h2>TransPort</h2>
    <p>Wpisz hasło dostępu do systemu</p>
    <div class="field" style="margin-bottom:14px">
      <label>Hasło</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkPassword()">
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="checkPassword()">Wejdź</button>
    <div id="login-error" style="color:var(--red-text);font-size:12px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="app-screen" class="app" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="main-sidebar">
    <div class="logo">
      <div class="logo-title">TransPort</div>
      <div class="logo-sub">zarządzanie flotą</div>
    </div>
    <div class="nav-sec">Główne</div>
    <div class="nav active" onclick="showView('dashboard')">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard
    </div>
    <div class="nav" onclick="showView('zlecenia')">
      <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h7"/></svg>Zlecenia
    </div>
    <div class="nav" onclick="showView('podwykonawcy')">
      <svg viewBox="0 0 16 16"><path d="M8 1v14M1 8h14"/></svg>Zlecenia zewnętrzne
    </div>
    <div class="nav-sec">Zasoby</div>
    <div class="nav" onclick="showView('kierowcy')">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>Kierowcy
    </div>
    <div class="nav" onclick="showView('flota')">
      <svg viewBox="0 0 16 16"><rect x="1" y="5" width="14" height="8" rx="1"/><path d="M4 5V3a1 1 0 011-1h6a1 1 0 011 1v2"/><circle cx="4.5" cy="13" r="1.5"/><circle cx="11.5" cy="13" r="1.5"/></svg>Flota
    </div>
    <div class="nav" onclick="showView('dokumenty')">
      <svg viewBox="0 0 16 16"><path d="M4 2h6l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M10 2v4h4M6 9h4M6 12h3"/></svg>Dokumenty
    </div>
    <div class="nav-sec">Analizy</div>
    <div class="nav" onclick="showView('raporty')">
      <svg viewBox="0 0 16 16"><path d="M2 12l4-4 3 3 5-7"/></svg>Raporty
    </div>
    <div class="nav" onclick="showView('rozliczenia')">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>Prowizja spedytora
    </div>
    <div class="nav" onclick="showView('kalkulator')">
      <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M5 6h6M5 9h4M5 12h3"/></svg>Kalkulator paliwa
    </div>
    <div class="nav" onclick="showView('kalendarz')">
      <svg viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="13" rx="1"/><path d="M1 6h14M5 1v2M11 1v2"/></svg>Kalendarz
    </div>
    <div style="flex:1"></div>
    <div style="padding:14px 16px;border-top:1px solid var(--border)">
      <button class="btn btn-sm" onclick="logout()">Wyloguj</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar" id="main-topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
        <h2 id="view-title">Dashboard</h2>
      </div>
      <div class="topbar-right">
        <span style="font-size:11px;color:var(--text3)"><span class="sync-indicator" id="sync-dot"></span><span id="sync-text">połączono</span></span>
        <div id="topbar-actions"></div>
      </div>
    </div>
    <div class="content" id="main-content">
      <div class="empty">Ładowanie...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Modal</h3>
      <button class="btn btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://lpvxzokrntzvpqjkudyf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwdnh6b2tybnR6dnBxamt1ZHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzA5NTIsImV4cCI6MjA5MTE0Njk1Mn0.8kCHA9nUsy9W6H92lVKW4yV-xNSwPhoNO2uJ_cphiss';
const CLAUDE_PROXY = 'https://lpvxzokrntzvpqjkudyf.supabase.co/functions/v1/claude-proxy';
const APP_PASSWORD = 'transport2024';
const GOOGLE_KEY = 'AIzaSyDZub9VnimP8WFzvBBzcyoDL-iCrynzG4I';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {auth:{persistSession:false,autoRefreshToken:false}});
const STATUS_MAP = {'Nowe':'b-gray','W trasie':'b-blue','Oczekuje':'b-amber','Dostarczone':'b-green','Anulowane':'b-red'};
let currentView = 'dashboard';
let orders=[], drivers=[], cars=[], docs=[], podw=[], kalEvents=[];
let editingId = null;
let kalYear = new Date().getFullYear(), kalMonth = new Date().getMonth();

// ── AUTH ──────────────────────────────────────────────────
function checkPassword() {
  const pass = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  if (pass === APP_PASSWORD) {
    sessionStorage.setItem('tp-logged','1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    initApp();
  } else {
    err.textContent = 'Nieprawidłowe hasło.';
  }
}
function logout() {
  sessionStorage.removeItem('tp-logged');
  location.reload();
}
document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('tp-logged') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    initApp();
  }
});

// ── INIT ──────────────────────────────────────────────────
async function initApp() {
  await loadAll();
  showView('dashboard');
  setInterval(async function() { await loadAll(); renderView(currentView); }, 30000);
  document.addEventListener('visibilitychange', async function() {
    if (document.visibilityState === 'visible') { await loadAll(); renderView(currentView); }
  });
}

async function loadAll() {
  setSync(true);
  try {
    const [z,k,f,d,pw,ke] = await Promise.all([
      sb.from('zlecenia').select('*').order('created_at',{ascending:false}),
      sb.from('kierowcy').select('*').order('nazwa'),
      sb.from('flota').select('*').order('rejestracja'),
      sb.from('dokumenty').select('*').order('created_at',{ascending:false}),
      sb.from('podwykonawcy_zlecenia').select('*').order('created_at',{ascending:false}),
      sb.from('kalendarz').select('*').order('data',{ascending:true})
    ]);
    if (z.error) throw new Error(z.error.message);
    orders = z.data||[]; drivers = k.data||[]; cars = f.data||[];
    docs = d.data||[]; podw = pw.data||[]; kalEvents = ke.data||[];
  } catch(e) {
    showToast('Błąd połączenia: ' + e.message, true);
  }
  setSync(false);
}

function setSync(loading) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (dot) { dot.className = 'sync-indicator' + (loading?' offline':''); }
  if (txt) { txt.textContent = loading ? 'sync...' : 'połączono'; }
}

// ── NAVIGATION ────────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.querySelectorAll('.nav').forEach(function(n) {
    n.classList.toggle('active', n.getAttribute('onclick') && n.getAttribute('onclick').includes("'" + v + "'"));
  });
  const titles = {dashboard:'Dashboard',zlecenia:'Zlecenia',podwykonawcy:'Zlecenia zewnętrzne',kierowcy:'Kierowcy',flota:'Flota',dokumenty:'Dokumenty',raporty:'Raporty',rozliczenia:'Prowizja spedytora',kalkulator:'Kalkulator paliwa',kalendarz:'Kalendarz'};
  document.getElementById('view-title').textContent = titles[v] || v;
  const btns = {
    zlecenia: '<button class="btn" onclick="exportExcelZlecenia()">Excel</button><button class="btn btn-primary" onclick="openOrderModal()">+ Nowe zlecenie</button>',
    dashboard: '<button class="btn btn-primary" onclick="openOrderModal()">+ Nowe zlecenie</button>',
    podwykonawcy: '<button class="btn btn-primary" onclick="openPodwModal()">+ Nowe zlecenie zewnętrzne</button>',
    kierowcy: '<button class="btn btn-primary" onclick="openDriverModal()">+ Kierowca</button>',
    flota: '<button class="btn btn-primary" onclick="openCarModal()">+ Auto</button>',
    dokumenty: '<button class="btn btn-primary" onclick="openDocModal()">+ Dokument</button>',
    raporty: '<button class="btn" onclick="exportExcelRaport()">Excel</button><button class="btn" onclick="exportExcelProwizja()">Excel prowizji</button>',
    kalendarz: '<button class="btn btn-primary" onclick="openKalModal(null,null)">+ Wydarzenie</button>',
    rozliczenia: '', kalkulator: ''
  };
  document.getElementById('topbar-actions').innerHTML = btns[v] || '';
  closeSidebar();
  renderView(v);
}

function renderView(v) {
  const c = document.getElementById('main-content');
  if (v==='dashboard') { c.innerHTML = renderDashboard(); setTimeout(function(){ document.querySelectorAll('.ord-row').forEach(function(tr){tr.style.cursor='pointer';tr.onclick=function(){showOrderDetail(this.getAttribute('data-oid'));};}); },0); }
  else if (v==='zlecenia') { c.innerHTML = renderZlecenia(); setTimeout(function(){ document.querySelectorAll('.ord-row').forEach(function(tr){tr.style.cursor='pointer';tr.onclick=function(){showOrderDetail(this.getAttribute('data-oid'));};}); },0); }

function initials(name) { return (name||'').split(' ').map(function(w){return w[0]||''}).join('').slice(0,2).toUpperCase(); }
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError?' error':'');
  t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')}, 3000);
}

// ── DASHBOARD ─────────────────────────────────────────────
function renderDashboard() {
  var wT = orders.filter(function(o){return o.status==='W trasie'}).length;
  var dst = orders.filter(function(o){return o.status==='Dostarczone'}).length;

  var przHtml = Object.entries(przychody).map(function(e){
    return '<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:11px;color:var(--text3)">'+e[0]+'</span><span style="font-size:16px;font-weight:600;color:var(--amber-text)">'+e[1].toLocaleString('pl-PL')+'</span></div>';
  }).join('') || '<span style="font-size:20px;font-weight:600">0</span>';
  var last = orders.slice(0,8);
  var html = '<div class="metrics">';
  html += '<div class="metric"><div class="metric-label">Wszystkie zlecenia</div><div class="metric-val">'+orders.length+'</div></div>';
  html += '<div class="metric"><div class="metric-label">W trasie</div><div class="metric-val blue">'+wT+'</div></div>';
  html += '<div class="metric"><div class="metric-label">Dostarczone</div><div class="metric-val green">'+dst+'</div></div>';
  html += '<div class="metric"><div class="metric-label">Łączny przychód</div>'+przHtml+'</div>';
  html += '</div>';
  html += '<div class="card"><div class="card-title">Ostatnie zlecenia</div>';
  if (last.length) {
    html += '<div style="overflow-x:auto"><table><thead><tr><th>Nr</th><th>Trasa</th><th>Klient</th><th>Kierowca</th><th>Załadunek</th><th>Fracht</th><th>Status</th></tr></thead><tbody>';
    last.forEach(function(o) { html += orderRow(o, false); });
    html += '</tbody></table></div>';
  } else html += '<div class="empty">Brak zleceń</div>';
  html += '</div>';
  html += '<div class="two-col">';
  html += '<div class="card"><div class="card-title">Kierowcy</div>';
  if (drivers.length) drivers.forEach(function(d) {
    html += '<div class="driver-row"><div class="avatar">'+initials(d.nazwa)+'</div><div style="flex:1;font-size:13px">'+d.nazwa+'</div><span class="badge '+(d.status==='W trasie'?'b-blue':d.status==='Urlop'?'b-amber':'b-green')+'">'+d.status+'</span></div>';
  }); else html += '<div class="empty">Brak kierowców</div>';
  html += '</div>';
  html += '<div class="card"><div class="card-title">Flota</div>';
  if (cars.length) cars.forEach(function(c) {
    html += '<div class="driver-row"><div style="flex:1;font-size:13px">'+c.rejestracja+' — '+c.model+'</div><span class="badge '+(c.status==='W trasie'?'b-blue':c.status==='Serwis'?'b-amber':'b-green')+'">'+c.status+'</span></div>';
  }); else html += '<div class="empty">Brak aut</div>';
  html += '</div></div>';
  return html;
}

// ── ZLECENIA ──────────────────────────────────────────────
function orderRow(o, showDostawa) {
  var tr = '<tr data-oid="'+o.id+'" class="ord-row" style="cursor:pointer">';
  tr += '<td style="font-family:monospace;font-size:11px;color:var(--text3)">'+(o.numer||o.id.slice(0,8))+'</td>';
  tr += '<td>'+(o.skad||'')+' → '+(o.dokad||'')+'</td>';
  tr += '<td>'+(o.klient||'-')+'</td>';
  tr += '<td>'+(o.kierowca||'-')+(o.kierowca2?' +'+o.kierowca2:'')+'</td>';
  tr += '<td>'+(o.data_zaladunek||'-')+'</td>';
  if(showDostawa) tr += '<td>'+(o.data_dostawa||'-')+'</td>';
  tr += '<td>'+(+o.fracht||0).toLocaleString('pl-PL')+' '+(o.waluta||'PLN')+'</td>';
  tr += '<td><span class="badge '+(STATUS_MAP[o.status]||'b-gray')+'">'+(o.status||'-')+'</span></td>';
  tr += '<td style="font-size:11px;color:var(--text2)">'+(o.data_wysylki||'-')+'</td>';
  tr += '<td><span class="badge '+(o.zaplacone?'b-green':'b-gray')+'">'+(o.zaplacone?'TAK':'NIE')+'</span></td>';
  tr += '</tr>';
  return tr;
}

function renderZlecenia() {
  var html = '<div class="filter-row"><input placeholder="Szukaj..." id="s-q" oninput="filterOrders()" style="width:200px"><select id="s-st" onchange="filterOrders()"><option value="">Wszystkie statusy</option><option>Nowe</option><option>W trasie</option><option>Oczekuje</option><option>Dostarczone</option><option>Anulowane</option></select></div>';
  html += '<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Nr</th><th>Trasa</th><th>Klient</th><th>Kierowca</th><th>Załadunek</th><th>Dostawa</th><th>Fracht</th><th>Status</th></tr></thead><tbody id="orders-tbody">';
  orders.forEach(function(o) { html += orderRow(o, true); });
  html += '</tbody></table></div>';
  if (!orders.length) html += '<div class="empty">Brak zleceń. Dodaj pierwsze zlecenie.</div>';
  html += '</div>';
  return html;
}

function filterOrders() {
  var q = (document.getElementById('s-q').value||'').toLowerCase();
  var st = document.getElementById('s-st').value||'';
  var filtered = orders.filter(function(o) {
    var match = !q || [o.skad,o.dokad,o.klient,o.kierowca,o.numer].some(function(v){return (v||'').toLowerCase().includes(q)});
    return match && (!st || o.status===st);
  });
  var tbody = document.getElementById('orders-tbody');
  if (tbody) tbody.innerHTML = filtered.map(function(o){return orderRow(o,true)}).join('');
}

async function saveOrder() {
  var skad = document.getElementById('f-skad').value.trim();
  var dokad = document.getElementById('f-dokad').value.trim();
  if (!skad||!dokad) { showToast('Uzupełnij Skąd i Dokąd', true); return; }
  var payload = {
    skad, dokad,
    numer: document.getElementById('f-numer').value.trim()||undefined,
    klient: document.getElementById('f-klient').value.trim(),
    status: document.getElementById('f-status').value,
    kierowca: document.getElementById('f-k1').value,
    kierowca2: document.getElementById('f-k2').value,
    auto: document.getElementById('f-auto').value,
    data_zaladunek: document.getElementById('f-zal').value||null,
    data_dostawa: document.getElementById('f-dos').value||null,
    fracht: parseFloat(document.getElementById('f-fracht').value)||0,
    waluta: document.getElementById('f-waluta').value,
    kilometry: parseFloat(document.getElementById('f-km').value)||0,
    prowizja_pct: parseFloat(document.getElementById('f-prow').value)||4,
    ref: document.getElementById('f-ref').value.trim(),
    data_wysylki: document.getElementById('f-wysylka')?.value||null,
    zaplacone: document.getElementById('f-zaplacone')?.checked||false,
    dojazd: document.getElementById('f-dojazd')?.value.trim()||'',
    uwagi: document.getElementById('f-uwagi').value.trim()
  };
  var err;
  if (!editingId) { var r = await sb.from('zlecenia').insert(payload); err=r.error; }
  else { var r = await sb.from('zlecenia').update(payload).eq('id',editingId); err=r.error; }
  if (err) { showToast('Błąd: '+err.message,true); return; }
  // Auto-update driver/car status
  var ns = payload.status==='W trasie'?'W trasie':payload.status==='Dostarczone'||payload.status==='Anulowane'?'Dostępny':null;
  if (ns && payload.kierowca) { var d1=drivers.find(function(d){return d.nazwa===payload.kierowca}); if(d1) await sb.from('kierowcy').update({status:ns}).eq('id',d1.id); }
  if (ns && payload.kierowca2) { var d2=drivers.find(function(d){return d.nazwa===payload.kierowca2}); if(d2) await sb.from('kierowcy').update({status:ns}).eq('id',d2.id); }
  var nc = payload.status==='W trasie'?'W trasie':payload.status==='Dostarczone'||payload.status==='Anulowane'?'Dostępne':null;
  if (nc && payload.auto) { var carRej=payload.auto.split(' — ')[0]; var car=cars.find(function(c){return c.rejestracja===carRej}); if(car) await sb.from('flota').update({status:nc}).eq('id',car.id); }
  // Upload file if selected
  var plikInput = document.getElementById('f-plik');
  if (plikInput && plikInput.files && plikInput.files[0]) {
    var plik = plikInput.files[0];
    var ext = plik.name.split('.').pop();
    var savedId = editingId || (await sb.from('zlecenia').select('id').order('created_at',{ascending:false}).limit(1).single()).data?.id;
    if (savedId) {
      var path = 'zlecenia/' + savedId + '.' + ext;
      var up = await sb.storage.from('zlecenia-pliki').upload(path, plik, {upsert:true});
      if (!up.error) {
        var urlData = sb.storage.from('zlecenia-pliki').getPublicUrl(path);
        await sb.from('zlecenia').update({plik_url: urlData.data.publicUrl}).eq('id', savedId);
      } else {
        showToast('Blad uploadu: ' + up.error.message, true);
      }
    }
  }
  closeModal(); showToast(editingId?'Zaktualizowano ✓':'Dodano ✓');
  await loadAll(); renderView(currentView);
}

async function deleteOrder(id) {
  if (!confirm('Na pewno usunąć zlecenie?')) return;
  await sb.from('zlecenia').delete().eq('id',id);
  closeModal(); showToast('Usunięto');
  await loadAll(); renderView(currentView);
}

// ── FLOTA ─────────────────────────────────────────────────
function renderFlota() {
  var today = new Date(), warn30 = new Date();
  warn30.setDate(today.getDate()+30);
  function dst(ds) { if(!ds) return null; var d=new Date(ds); return d<today?'exp':d<=warn30?'soon':'ok'; }
  function dfmt(ds) { return ds?new Date(ds).toLocaleDateString('pl-PL'):'-'; }
  function dbadge(ds) {
    if(!ds) return '-';
    var s=dst(ds),f=dfmt(ds);
    if(s==='exp') return '<span class="badge b-red">'+f+' PRZETERMINOWANY</span>';
    if(s==='soon') return '<span class="badge b-amber">'+f+' wkrótce</span>';
    return '<span style="font-size:12px;color:var(--text2)">'+f+'</span>';
  }
  var alerts = cars.filter(function(c){ var p=dst(c.data_przegladu),u=dst(c.data_ubezpieczenia); return p==='exp'||p==='soon'||u==='exp'||u==='soon'; });
  var alertHtml = '';
  if (alerts.length) {
    var msgs = alerts.map(function(c) {
      var parts=[],p=dst(c.data_przegladu),u=dst(c.data_ubezpieczenia);
      if(p==='exp') parts.push(c.rejestracja+': przegląd PRZETERMINOWANY');
      else if(p==='soon') parts.push(c.rejestracja+': przegląd '+dfmt(c.data_przegladu));
      if(u==='exp') parts.push(c.rejestracja+': ubezp. PRZETERMINOWANE');
      else if(u==='soon') parts.push(c.rejestracja+': ubezp. '+dfmt(c.data_ubezpieczenia));
      return parts.join(', ');
    }).join(' | ');
    alertHtml = '<div style="background:var(--amber-bg);border:1px solid #d4a017;border-radius:var(--radius);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--amber-text)"><strong>Uwaga!</strong> '+msgs+'</div>';
  }
  var rows = '';
  cars.forEach(function(c) {
    var cnt=orders.filter(function(o){return o.auto===c.rejestracja+' — '+c.model}).length;
    var ps=dst(c.data_przegladu),us=dst(c.data_ubezpieczenia);
    var rbg=(ps==='exp'||us==='exp')?'background:var(--red-bg)':(ps==='soon'||us==='soon')?'background:var(--amber-bg)':'';
    var sb2=c.status==='W trasie'?'b-blue':c.status==='Serwis'?'b-amber':'b-green';
    rows += '<tr data-carid="'+c.id+'" style="'+rbg+';cursor:pointer"><td><strong>'+c.rejestracja+'</strong></td><td>'+c.model+'</td><td style="color:var(--text2)">'+(c.rok||'-')+'</td><td><span class="badge '+sb2+'">'+c.status+'</span></td><td>'+dbadge(c.data_przegladu)+'</td><td>'+dbadge(c.data_ubezpieczenia)+'</td><td>'+cnt+'</td></tr>';
  });
  var html = alertHtml+'<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table id="flota-tbl"><thead><tr><th>Rejestracja</th><th>Marka i model</th><th>Rok</th><th>Status</th><th>Przegląd</th><th>Ubezpieczenie</th><th>Zlecenia</th></tr></thead><tbody>'+rows+'</tbody></table>';
  if (!cars.length) html += '<div class="empty">Brak aut we flocie</div>';
  html += '</div></div>';
  setTimeout(function() {
    var tbl = document.getElementById('flota-tbl');
    if (tbl) tbl.addEventListener('click', function(e) {
      var tr = e.target.closest('tr[data-carid]');
      if (tr) openCarModal(tr.getAttribute('data-carid'));
    });
  }, 50);
  return html;
}

// ── PROWIZJA ──────────────────────────────────────────────
function calcProwizja(fracht, km, waluta, pct) {
  if (!km||km<=0) return null;
  var stawka = fracht/km;
  var procent = (pct||4)/100;
  var prowizja, opis;
  if (stawka<=1.3) {
    prowizja = fracht*procent;
    opis = fracht.toFixed(2)+' '+waluta+' x '+(pct||4)+'% = '+prowizja.toFixed(2)+' '+waluta;
  } else {
    var baz=km*1.3, nad=fracht-baz;
    prowizja = baz*procent + nad/2;
    opis = 'baza '+baz.toFixed(2)+' x '+(pct||4)+'% + nadwyżka '+nad.toFixed(2)+' / 2 = '+prowizja.toFixed(2)+' '+waluta;
  }
  return {stawka, prowizja, opis};
}

  var all = orders.concat(podw.map(function(p){return Object.assign({},p,{skad:p.skad,dokad:p.dokad})}));

  if (!zl.length) return '<div class="card"><div class="empty">Brak zleceń z kilometrami</div></div>';
  var total={};
  zl.forEach(function(o){ var w=o.waluta||'EUR'; var r=calcProwizja(+o.fracht,+o.kilometry,w,+o.prowizja_pct||4); if(r) total[w]=(total[w]||0)+r.prowizja; });
  var sumHtml = Object.entries(total).map(function(e){return '<div class="metric" style="display:inline-flex;flex-direction:column;padding:12px 20px;margin-right:10px"><div class="metric-label">Prowizja łącznie ('+e[0]+')</div><div class="metric-val amber">'+e[1].toFixed(2)+' '+e[0]+'</div></div>'}).join('');
  var rows = '';

    var w=o.waluta||'EUR'; var r=calcProwizja(+o.fracht,+o.kilometry,w,+o.prowizja_pct||4); if(!r) return;
    rows += '<tr><td style="font-family:monospace;font-size:11px;color:var(--text3)">'+(o.numer||o.id.slice(0,8))+'</td><td>'+(o.skad||'')+' → '+(o.dokad||'')+'</td><td style="text-align:right">'+Math.round(+o.kilometry)+' km</td><td style="text-align:right">'+(+o.fracht).toFixed(2)+' '+w+'</td><td style="text-align:right;color:var(--text2)">'+(+o.prowizja_pct||4)+'%</td><td style="text-align:right;font-weight:500">'+r.prowizja.toFixed(2)+' '+w+'</td></tr>';
  });
  return '<div style="margin-bottom:14px;display:flex;flex-wrap:wrap">'+sumHtml+'</div><div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table><thead><tr><th>Nr zlecenia</th><th>Trasa</th><th style="text-align:right">km</th><th style="text-align:right">Fracht</th><th style="text-align:right">%</th><th style="text-align:right">Prowizja</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function kalkuluj() {
  var cb=parseFloat(document.getElementById('k-cb').value)||0;
  var db=parseFloat(document.getElementById('k-db').value)||1;
  var ud=(parseFloat(document.getElementById('k-ud').value)||35)/100;
  var da=parseFloat(document.getElementById('k-da').value)||0;
  var cr=parseFloat(document.getElementById('k-cr').value)||0;
  var npar=cb*(1-ud), wsp=da/db;
  var cena=npar+cb*ud*wsp;
  var dp=(cena-cb)/cb*100, de=cena-cb;
  var ddp=(da-db)/db*100;
  function fp(v){return(v>=0?'+':'')+v.toFixed(1)+'%'}
  var el=function(id){return document.getElementById(id)};
  if(!el('k-r1')) return;
  el('k-r1').textContent=cena.toFixed(2)+' €';
  el('k-r2').textContent=fp(dp); el('k-r2').style.color=dp>0?'var(--amber-text)':'var(--green-text)';
  el('k-r3').textContent=fp(ddp); el('k-r3').style.color=ddp>0?'var(--amber-text)':'var(--green-text)';
  var scenarios=[3.5,4.0,4.5,4.6,5.0,5.5,6.0,6.5,6.76,7.0,7.5,8.0];
  var tbody=el('k-tbody'); if(!tbody) return;
  tbody.innerHTML=scenarios.map(function(d){
    var c2=npar+cb*ud*d/db, dp2=(c2-cb)/cb*100, de2=c2-cb;
    var isA=Math.abs(d-da)<0.01, isB=Math.abs(d-db)<0.01;
    var bg=isA?'background:var(--blue-bg)':isB?'background:var(--green-bg)':'';
    return '<tr style="'+bg+'"><td>'+d.toFixed(2)+' PLN/l'+(isA?' ◀ aktualny':'')+(isB?' ◀ baza':'')+'</td><td style="font-weight:500">'+c2.toFixed(2)+' €</td><td style="color:'+(dp2>0?'var(--amber-text)':'var(--green-text)')+'">'+fp(dp2)+'</td><td style="color:'+(de2>0?'var(--amber-text)':'var(--green-text)')+'">'+((de2>=0?'+':'')+de2.toFixed(2)+' €')+'</td></tr>';
  }).join('');
}

// ── KALENDARZ ─────────────────────────────────────────────
function renderKalendarz() {
  var today=new Date(), todayStr=today.toISOString().slice(0,10);
  var first=new Date(kalYear,kalMonth,1), last=new Date(kalYear,kalMonth+1,0);
  var startDow=(first.getDay()+6)%7, daysInMonth=last.getDate();
  var mnazwy=['Styczen','Luty','Marzec','Kwiecien','Maj','Czerwiec','Lipiec','Sierpien','Wrzesien','Pazdziernik','Listopad','Grudzien'];
  var q=String.fromCharCode(39);
  function evFor(ds) {
    var ev=kalEvents.filter(function(e){return e.data===ds});
    orders.forEach(function(o){ if(o.data_zaladunek===ds) ev.push({tytul:o.skad||'Zaladunek',typ:'zaladunek',_ro:true}); if(o.data_dostawa===ds) ev.push({tytul:o.dokad||'Dostawa',typ:'dostawa',_ro:true}); });
    podw.forEach(function(p){ if(p.skad_data===ds) ev.push({tytul:p.skad||'Zaladunek zew.',typ:'zaladunek',_ro:true}); if(p.dokad_data===ds) ev.push({tytul:p.dokad||'Dostawa zew.',typ:'dostawa',_ro:true}); });
    return ev;
  }
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><button class="btn" onclick="kalPrev()">&#8249; Wstecz</button><h3 style="font-size:16px;font-weight:600">'+mnazwy[kalMonth]+' '+kalYear+'</h3><button class="btn" onclick="kalNext()">Dalej &#8250;</button></div>';
  html+='<div class="kal-header">'+['Pon','Wt','Sr','Czw','Pt','Sob','Nd'].map(function(d){return '<div class="kal-day-name">'+d+'</div>'}).join('')+'</div>';
  html+='<div class="kal-grid">';
  for(var i=0;i<startDow;i++) {
    var pd=new Date(kalYear,kalMonth,-startDow+i+1);
    html+='<div class="kal-day other-month"><div class="kal-day-num">'+pd.getDate()+'</div></div>';
  }
  for(var d=1;d<=daysInMonth;d++) {
    var ds=kalYear+'-'+String(kalMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isT=ds===todayStr, ev=evFor(ds);
    var dayClass='kal-day'+(isT?' today':'');
    html+='<div class="'+dayClass+'" onclick="openKalModal('+q+ds+q+',null)" style="cursor:pointer">';
    html+='<div class="kal-day-num">'+d+'</div>';
    ev.slice(0,3).forEach(function(e){
      if(e._ro) {
        html+='<div class="kal-event typ-'+(e.typ||'notatka')+'" title="'+e.tytul+'">'+e.tytul+'</div>';
      } else {
        var eid=e.id||'';
        html+='<div class="kal-event typ-'+(e.typ||'notatka')+'" onclick="event.stopPropagation();openKalModal('+q+ds+q+','+q+eid+q+')" title="'+e.tytul+'">'+e.tytul+'</div>';
      }
    });
    if(ev.length>3) html+='<div style="font-size:9px;color:var(--text3)">+'+(ev.length-3)+' wiecej</div>';
    html+='</div>';
  }
  var endDow=(last.getDay()+6)%7;
  for(var i=endDow+1;i<7;i++) html+='<div class="kal-day other-month"><div class="kal-day-num">'+(i-endDow)+'</div></div>';
  html+='</div>';
  return html;
}

function kalPrev() { kalMonth--; if(kalMonth<0){kalMonth=11;kalYear--;} renderView('kalendarz'); }
function kalNext() { kalMonth++; if(kalMonth>11){kalMonth=0;kalYear++;} renderView('kalendarz'); }

function openKalModal(dateStr, eventId) {
  // If eventId given - edit that event directly
  if (eventId) {
    _openKalEditModal(dateStr, eventId);
    return;
  }
  // Show events for this day + option to add new
  var dayEvents = kalEvents.filter(function(e){ return e.data===dateStr; });
  var dayOrders = [];
  orders.forEach(function(o){
    if(o.data_zaladunek===dateStr) dayOrders.push({tytul:(o.skad||'Zaladunek')+' → '+(o.dokad||''), typ:'zaladunek', _ro:true});
    if(o.data_dostawa===dateStr) dayOrders.push({tytul:'Dostawa: '+(o.dokad||''), typ:'dostawa', _ro:true});
  });
  podw.forEach(function(p){
    if(p.skad_data===dateStr) dayOrders.push({tytul:(p.skad||'Zal. zew.')+' → '+(p.dokad||''), typ:'zaladunek', _ro:true});
    if(p.dokad_data===dateStr) dayOrders.push({tytul:'Dostawa zew.: '+(p.dokad||''), typ:'dostawa', _ro:true});
  });
  var allEvents = dayEvents.concat(dayOrders);

  document.getElementById('modal-title').textContent = 'Dzien: '+dateStr;
  var html = '';
  if (allEvents.length > 0) {
    html += '<div style="grid-column:1/-1;margin-bottom:8px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px">Wydarzenia w tym dniu:</div>';
    allEvents.forEach(function(e) {
      if (e._ro) {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg2);border-radius:var(--radius);margin-bottom:6px">';
        html += '<span class="badge typ-'+e.typ+' kal-event" style="flex-shrink:0">'+e.typ+'</span>';
        html += '<span style="font-size:13px">'+e.tytul+'</span>';
        html += '</div>';
      } else {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg2);border-radius:var(--radius);margin-bottom:6px;cursor:pointer" id="kal-ev-'+e.id+'">';
        html += '<span class="badge kal-event typ-'+(e.typ||'notatka')+'" style="flex-shrink:0">'+(e.typ||'notatka')+'</span>';
        html += '<span style="flex:1;font-size:13px">'+e.tytul+'</span>';
        if(e.notatka) html += '<span style="font-size:11px;color:var(--text3)">'+e.notatka.slice(0,30)+(e.notatka.length>30?'...':'')+'</span>';
        html += '<button class="btn btn-sm kal-edit-btn" data-id="'+e.id+'" data-ds="'+dateStr+'">Edytuj</button>';
        html += '</div>';
      }
    });
    html += '</div>';
  } else {
    html += '<div style="grid-column:1/-1;color:var(--text3);font-size:13px;margin-bottom:8px">Brak wydarzen w tym dniu.</div>';
  }
  html += '<div style="grid-column:1/-1"><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px">Dodaj nowe wydarzenie:</div></div>';
  html += '<div class="field"><label>Tytul</label><input id="kal-t" placeholder="np. Spotkanie z klientem"></div>';
  html += '<div class="field"><label>Typ</label><select id="kal-typ"><option value="notatka">Notatka</option><option value="zaladunek">Zaladunek</option><option value="dostawa">Dostawa</option><option value="serwis">Serwis</option></select></div>';
  html += '<div class="field full"><label>Notatka</label><textarea id="kal-n" rows="3"></textarea></div>';

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-foot').innerHTML =
    '<button class="btn" onclick="closeModal()">Zamknij</button>' +
    '<button class="btn btn-primary" id="kal-save-btn">Dodaj wydarzenie</button>';

  setTimeout(function() {
    var sb2 = document.getElementById('kal-save-btn');
    if(sb2) sb2.onclick = function(){ saveKalEvent(dateStr); };
    document.querySelectorAll('.kal-edit-btn').forEach(function(btn) {
      btn.onclick = function() {
        closeModal();
        _openKalEditModal(this.getAttribute('data-ds'), this.getAttribute('data-id'));
      };
    });
  }, 0);
  openModal();
}

function _openKalEditModal(dateStr, eventId) {
  var ev = kalEvents.find(function(e){return e.id===eventId});
  if (!ev) return;
  editingId = ev.id;
  document.getElementById('modal-title').textContent = 'Edytuj wydarzenie';
  var typOpts = ['notatka','zaladunek','dostawa','serwis'].map(function(t){
    return '<option value="'+t+'"'+(ev.typ===t?' selected':'')+'>'+t.charAt(0).toUpperCase()+t.slice(1)+'</option>';
  }).join('');
  document.getElementById('modal-body').innerHTML =
    '<div class="field"><label>Data</label><input type="date" id="kal-d" value="'+(ev.data||dateStr||'')+'"></div>' +
    '<div class="field"><label>Tytul</label><input id="kal-t2" value="'+(ev.tytul||'')+'"></div>' +
    '<div class="field"><label>Typ</label><select id="kal-typ2">'+typOpts+'</select></div>' +
    '<div class="field full"><label>Notatka</label><textarea id="kal-n2" rows="4">'+(ev.notatka||'')+'</textarea></div>';
  document.getElementById('modal-foot').innerHTML =
    '<button class="btn btn-danger" id="kal-del-btn">Usun</button>' +
    '<button class="btn" onclick="closeModal()">Anuluj</button>' +
    '<button class="btn btn-primary" onclick="updateKalEvent()">Zapisz</button>';
  setTimeout(function() {
    var db = document.getElementById('kal-del-btn');
    if(db) db.onclick = function() { deleteKalEvent(); };
  }, 0);
  openModal();
}

async function saveKalEvent(dateStr) {
  var tytul = document.getElementById('kal-t').value.trim();
  if (!tytul) { showToast('Podaj tytul', true); return; }
  var payload = {
    data: dateStr,
    tytul: tytul,
    typ: document.getElementById('kal-typ').value,
    notatka: document.getElementById('kal-n').value.trim()
  };
  await sb.from('kalendarz').insert(payload);
  closeModal(); showToast('Dodano wydarzenie');
  await loadAll(); renderView('kalendarz');
}





async function deleteKalEvent() {
  if(!confirm('Usunąć wydarzenie?')) return;
  await sb.from('kalendarz').delete().eq('id',editingId);
  closeModal(); showToast('Usunięto');
  await loadAll(); renderView('kalendarz');
}

// ── AI PDF READING ─────────────────────────────────────────
function fileToBase64(file) {
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result.split(',')[1])};
    r.onerror=rej;
    r.readAsDataURL(file);
  });

async function callClaudeWithPDF(base64, type) {
  var prompt = type==='podw'
    ? 'Przeanalizuj zlecenie transportowe. Zwróć TYLKO JSON: {"numer":"","zleceniobiorca_nazwa":"","zleceniobiorca_adres":"","zleceniobiorca_nip":"","kierowca":"","kierowca_tel":"","auto":"","skad":"","skad_adres":"","skad_data":"YYYY-MM-DD","skad_godz":"","dokad":"","dokad_adres":"","dokad_data":"YYYY-MM-DD","dokad_godz":"","fracht":0,"waluta":"EUR","platnosc_dni":30,"referencje":"","uwagi":""}'
    : 'Przeanalizuj zlecenie transportowe. Zwróć TYLKO JSON: {"numer":"","skad":"","dokad":"","klient":"","kierowca":"","auto":"","data_zaladunek":"YYYY-MM-DD","data_dostawa":"YYYY-MM-DD","fracht":0,"waluta":"EUR","uwagi":""}';
  var resp = await fetch(CLAUDE_PROXY, {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}},{type:'text',text:prompt}]}]
    })
  });
  var data=await resp.json();
  if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
  var content=data.content||[];
  var tb=content.find(function(b){return b.type==='text'});
  if(!tb) throw new Error('Brak odpowiedzi AI');
  var text=tb.text.replace(/```json/g,'').replace(/```/g,'').trim();
  return JSON.parse(text);
}

  var own=orders.filter(function(o){return o.status!=='Anulowane'&&mm(o.data_zaladunek)});
  var ext=podw.filter(function(p){return p.status!=='Anulowane'&&mm(p.skad_data)});
  var wb=XLSX.utils.book_new();
  var sumData=[['RAPORT MIESIĘCZNY - '+(fm||new Date().toISOString().slice(0,7))],[]];
  sumData.push(['Własne zlecenia',own.length]);
  sumData.push(['Zewnętrzne zlecenia',ext.length]);
  var wsSum=XLSX.utils.aoa_to_sheet(sumData);
  XLSX.utils.book_append_sheet(wb,wsSum,'Podsumowanie');
  var data=[['Nr','Typ','Skad','Dokad','Klient','Data zaladunku','Fracht','Waluta','km','Status']];
  own.forEach(function(o){data.push([o.numer||'','własne',o.skad||'',o.dokad||'',o.klient||'',o.data_zaladunek||'',+o.fracht||0,o.waluta||'PLN',+o.kilometry||0,o.status||''])});
  ext.forEach(function(p){data.push([p.numer||'','zewnętrzne',p.skad||'',p.dokad||'',p.zleceniobiorca_nazwa||'',p.skad_data||'',+p.fracht||0,p.waluta||'EUR',+p.kilometry||0,p.status||''])});
  var wsD=XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb,wsD,'Zlecenia');
  XLSX.writeFile(wb,'raport-'+(fm||new Date().toISOString().slice(0,7))+'.xlsx');
  showToast('Raport pobrany');
}

function exportExcelProwizja() {
  if(!window.XLSX) { showToast('Biblioteka XLSX niedostępna', true); return; }
  var fm=document.getElementById('r-month')?document.getElementById('r-month').value:'';
  function mm(ds){return !fm||(ds||'').startsWith(fm);}
  var all=orders.filter(function(o){return o.status!=='Anulowane'&&mm(o.data_zaladunek)&&o.kilometry>0&&o.fracht>0})
    .concat(podw.filter(function(p){return p.status!=='Anulowane'&&mm(p.skad_data)&&p.kilometry>0&&p.fracht>0}).map(function(p){return Object.assign({},p,{skad:p.skad,dokad:p.dokad,waluta:p.waluta||'EUR'})}));
  var wb=XLSX.utils.book_new();
  var total={};
  all.forEach(function(o){var w=o.waluta||'EUR';var r=calcProwizja(+o.fracht,+o.kilometry,w,+o.prowizja_pct||4);if(r) total[w]=(total[w]||0)+r.prowizja;});
  var sumData=[['PROWIZJA SPEDYTORA - '+(fm||new Date().toISOString().slice(0,7))],[]];
  Object.entries(total).forEach(function(e){sumData.push([e[0],+e[1].toFixed(2)])});
  var wsSum=XLSX.utils.aoa_to_sheet(sumData);
  XLSX.utils.book_append_sheet(wb,wsSum,'Podsumowanie');
  var data=[['Nr','Trasa','Fracht','Waluta','km','Stawka/km','Prowizja%','Prowizja']];
  all.forEach(function(o){var w=o.waluta||'EUR';var r=calcProwizja(+o.fracht,+o.kilometry,w,+o.prowizja_pct||4);if(r) data.push([o.numer||'',(o.skad||'')+' -> '+(o.dokad||''),+o.fracht,w,+o.kilometry,+r.stawka.toFixed(2),+o.prowizja_pct||4,+r.prowizja.toFixed(2)])});
  var wsD=XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb,wsD,'Szczegoly');
  XLSX.writeFile(wb,'prowizja-'+(fm||new Date().toISOString().slice(0,7))+'.xlsx');
  showToast('Excel prowizji pobrany');
}

async function calcDistanceKm(origin, destination) {
  if (!origin || !destination || origin.length < 3 || destination.length < 3) return null;
  try {
    // Use Supabase proxy to avoid CORS
    var gmUrl = 'https://maps.googleapis.com/maps/api/distancematrix/json?origins=' + encodeURIComponent(origin) + '&destinations=' + encodeURIComponent(destination) + '&mode=driving&key=' + GOOGLE_KEY;
    var resp = await fetch(CLAUDE_PROXY, {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
      body: JSON.stringify({_gmaps_proxy: gmUrl})
    });
    var data = await resp.json();
    if (data.rows && data.rows[0] && data.rows[0].elements[0] && data.rows[0].elements[0].status==='OK') {
      return Math.round(data.rows[0].elements[0].distance.value / 1000);
    }
  } catch(e) { console.warn('Distance calc failed:', e); }
  return null;
}

async function autoCalcKm(skadId, dokadId, kmId, statusId, dojazdId) {
  var skadEl = document.getElementById(skadId);
  var dokadEl = document.getElementById(dokadId);
  var kmEl = document.getElementById(kmId);
  var stEl = document.getElementById(statusId);
  var dojazdEl = dojazdId ? document.getElementById(dojazdId) : null;
  if (!skadEl || !dokadEl || !kmEl) return;
  var origin = (dojazdEl && dojazdEl.value.trim()) ? dojazdEl.value.trim() : skadEl.value.trim();
  var dest = dokadEl.value.trim();
  if (origin.length < 3 || dest.length < 3) { showToast('Wpisz adresy skad i dokad', true); return; }
  if (stEl) { stEl.textContent = 'Obliczam...'; stEl.style.color = 'var(--text2)'; }
  var km = await calcDistanceKm(origin, dest);
  if (km) {
    kmEl.value = km;
    if (stEl) { stEl.textContent = km + ' km (Google Maps)'; stEl.style.color = 'var(--green-text)'; }
    showToast('Obliczono: ' + km + ' km');
  } else {
    if (stEl) { stEl.textContent = 'Nie udalo sie obliczyc'; stEl.style.color = 'var(--red-text)'; }
    showToast('Blad obliczania km', true);
  }
}
