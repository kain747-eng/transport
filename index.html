<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TransPort — zarządzanie zleceniami</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/polyfills.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/polyfills.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f8f6;--bg3:#f1f0eb;
  --text:#1a1a18;--text2:#6b6a65;--text3:#9e9d98;
  --border:#e0dfd9;--border2:#c8c7c0;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --red-bg:#FCEBEB;--red-text:#791F1F;
  --gray-bg:#F1EFE8;--gray-text:#444441;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;min-height:100vh}
.app{display:flex;height:100vh;overflow:hidden;height:100dvh}
.sidebar{width:200px;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.logo-title{font-size:16px;font-weight:600;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text2);margin-top:2px}
.nav-sec{font-size:10px;color:var(--text3);padding:14px 16px 4px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
.nav{display:flex;align-items:center;gap:9px;padding:9px 16px;font-size:13px;cursor:pointer;color:var(--text2);border-left:2px solid transparent;transition:background .15s;user-select:none}
.nav:hover{background:var(--bg2);color:var(--text)}
.nav.active{color:var(--blue-text);background:var(--blue-bg);border-left-color:var(--blue);font-weight:500}
.nav svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.topbar h2{font-size:15px;font-weight:600}
.topbar-right{display:flex;align-items:center;gap:10px}
.user-badge{font-size:12px;color:var(--text2);background:var(--bg2);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}
.content{flex:1;overflow-y:auto;padding:20px 22px;background:var(--bg3)}
.btn{font-size:12px;padding:7px 14px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;background:var(--bg);color:var(--text);transition:background .15s;font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--blue);color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#185FA5}
.btn-danger{color:var(--red-text);border-color:#f09595}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:4px 10px;font-size:11px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.metric{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);padding:14px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-val{font-size:24px;font-weight:600}
.metric-val.blue{color:var(--blue-text)}
.metric-val.green{color:var(--green-text)}
.metric-val.amber{color:var(--amber-text)}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--text3);font-weight:500;font-size:11px;border-bottom:1px solid var(--border);background:var(--bg2)}
td{padding:10px 10px;border-bottom:1px solid var(--border);color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:var(--bg2);cursor:pointer}
.badge{display:inline-block;font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.b-blue{background:var(--blue-bg);color:var(--blue-text)}
.b-green{background:var(--green-bg);color:var(--green-text)}
.b-amber{background:var(--amber-bg);color:var(--amber-text)}
.b-gray{background:var(--gray-bg);color:var(--gray-text)}
.b-red{background:var(--red-bg);color:var(--red-text)}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding-top:50px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:1px solid var(--border);width:560px;max-width:95vw}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-head h3{font-size:15px;font-weight:600}
.modal-body{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;color:var(--text2);font-weight:500}
.field input,.field select,.field textarea{font-size:13px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);width:100%;font-family:inherit;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue)}
.field textarea{resize:vertical;min-height:70px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.toast{position:fixed;bottom:24px;right:24px;background:#27500A;color:#EAF3DE;font-size:13px;padding:10px 18px;border-radius:var(--radius);z-index:200;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{background:#791F1F;color:#FCEBEB}
.loader{text-align:center;padding:40px;color:var(--text2);font-size:13px}
.empty{text-align:center;padding:50px;color:var(--text3);font-size:13px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.driver-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.driver-row:last-child{border-bottom:none}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--blue-text);flex-shrink:0}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-row{background:var(--bg2);border-radius:var(--radius);padding:10px 12px}
.detail-row.full{grid-column:1/-1}
.detail-label{font-size:10px;color:var(--text3);margin-bottom:3px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.detail-val{font-size:13px;font-weight:500}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg3)}
.login-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px;width:360px}
.login-box h2{font-size:20px;font-weight:600;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--text2);margin-bottom:24px}
.login-box .field{margin-bottom:14px}
.login-box .field label{display:block;margin-bottom:5px;font-size:12px;color:var(--text2);font-weight:500}
.login-box .field input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--radius);font-size:14px;font-family:inherit}
.login-box .btn{width:100%;padding:10px;font-size:14px}
.login-hint{font-size:12px;color:var(--text3);text-align:center;margin-top:14px}
.sync-indicator{width:7px;height:7px;border-radius:50%;background:#639922;display:inline-block;margin-right:6px}
.sync-indicator.offline{background:#E24B4A}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-row select,.filter-row input{font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit}

@media (max-width: 900px) {
  .app { flex-direction:column; height:auto; min-height:100vh; }
  .sidebar {
    position:fixed !important; left:-210px; top:0; bottom:0; z-index:50;
    width:210px !important; transition:left .25s ease; overflow-y:auto;
    box-shadow:2px 0 12px rgba(0,0,0,0.15);
    background:var(--bg); flex-direction:column; display:flex;
  }
  .sidebar.open { left:0 !important; }
  .sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:40; }
  .sidebar-overlay.open { display:block; }
  .main { width:100%; height:auto; overflow:visible; }
  .topbar { padding:10px 14px; }
  .topbar h2 { font-size:14px; }
  .hamburger { display:flex !important; }
  .content { padding:12px 14px; overflow-y:visible; }
  .metrics { grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; margin-bottom:12px; }
  .metric-val { font-size:18px; }
  table { font-size:11px; }
  th, td { padding:7px 6px; }
  .two-col { grid-template-columns:1fr; }
  .modal-overlay { padding-top:0; align-items:flex-end; }
  .modal { width:100%; max-width:100%; border-radius:var(--radius-lg) var(--radius-lg) 0 0; max-height:92vh; overflow-y:auto; }
  .modal-body { grid-template-columns:1fr; padding:14px; gap:10px; }
  .filter-row { flex-direction:column; }
  .filter-row select, .filter-row input { width:100%; }
  .card { padding:12px; margin-bottom:10px; }
  .btn { padding:6px 10px; font-size:11px; }
  .topbar-right > span { display:none; }
  .hide-mobile { display:none !important; }
  .nav-sec { font-size:9px; padding:10px 14px 2px; }
}
@media (max-width: 500px) {
  .metrics { grid-template-columns:1fr 1fr; }
  .topbar h2 { font-size:13px; }
  .content { padding:10px; }
}
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h2>TransPort</h2>
    <p>Wpisz hasło dostępu do systemu</p>
    <div class="field" style="margin-bottom:14px">
      <label>Hasło</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')checkPassword()">
    </div>
    <button class="btn btn-primary" onclick="checkPassword()">Wejdź</button>
    <div id="login-error" style="color:#791F1F;font-size:12px;margin-top:10px;text-align:center"></div>
  </div>
</div>

<div id="app-screen" class="app" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="main-sidebar">
    <div class="logo">
      <div class="logo-title">TransPort</div>
      <div class="logo-sub">zarządzanie flotą</div>
    </div>
    <div class="nav-sec">Główne</div>
    <div class="nav active" onclick="showView('dashboard')">
      <svg viewBox="0 0 16 16"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg>Dashboard
    </div>
    <div class="nav" onclick="showView('zlecenia')">
      <svg viewBox="0 0 16 16"><path d="M2 4h12M2 8h12M2 12h7"/></svg>Zlecenia
    </div>
    <div class="nav" onclick="showView('kierowcy')">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/></svg>Kierowcy
    </div>
    <div class="nav" onclick="showView('flota')">
      <svg viewBox="0 0 16 16"><rect x="1" y="5" width="14" height="8" rx="1"/><path d="M4 5V3a1 1 0 011-1h6a1 1 0 011 1v2"/><circle cx="4.5" cy="13" r="1.5"/><circle cx="11.5" cy="13" r="1.5"/></svg>Flota
    </div>
    <div class="nav-sec">Dokumenty</div>
    <div class="nav" onclick="showView('dokumenty')">
      <svg viewBox="0 0 16 16"><path d="M4 2h6l4 4v9a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M10 2v4h4M6 9h4M6 12h3"/></svg>Dokumenty
    </div>
    <div class="nav" onclick="showView('podwykonawcy')">
      <svg viewBox="0 0 16 16"><path d="M8 1v14M1 8h14"/></svg>Zlecenia zewnętrzne
    </div>
    <div class="nav-sec">Analizy</div>
    <div class="nav" onclick="showView('raporty')">
      <svg viewBox="0 0 16 16"><path d="M2 12l4-4 3 3 5-7"/></svg>Raporty
    </div>
    <div class="nav" onclick="showView('rozliczenia')">
      <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>Prowizja spedytora
    </div>
    <div class="nav" onclick="showView('kalkulator')">
      <svg viewBox="0 0 16 16"><rect x="2" y="2" width="12" height="12" rx="1"/><path d="M5 6h6M5 9h4M5 12h3"/></svg>Kalkulator paliwa
    </div>
    <div style="flex:1"></div>
    <div class="sidebar-bottom" style="padding:14px 16px;border-top:1px solid var(--border)">
      <button class="btn btn-sm" onclick="logout()">Wyloguj</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar" id="main-topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
        <h2 id="view-title">Dashboard</h2>
      </div>
      <div class="topbar-right">
        <span><span class="sync-indicator" id="sync-dot"></span><span id="sync-text" style="font-size:11px;color:var(--text3)">połączono</span></span>
        <div id="topbar-actions"></div>
      </div>
    </div>
    <div class="content" id="main-content">
      <div class="loader">Ładowanie danych...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title">Nowe zlecenie</h3>
      <button class="btn btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://lpvxzokrntzvpqjkudyf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxwdnh6b2tybnR6dnBxamt1ZHlmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzA5NTIsImV4cCI6MjA5MTE0Njk1Mn0.8kCHA9nUsy9W6H92lVKW4yV-xNSwPhoNO2uJ_cphiss';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { persistSession: false, autoRefreshToken: false }
});

const STATUS_MAP = {'Nowe':'b-gray','W trasie':'b-blue','Oczekuje':'b-amber','Dostarczone':'b-green','Anulowane':'b-red'};
let currentView = 'dashboard';
let currentUser = null;
let orders = [], drivers = [], cars = [], docs = [], podw = [];
let editingId = null;

// ── AUTH — proste hasło, bez Supabase auth ─────────────────
const APP_PASSWORD = 'transport2024';
const ANTHROPIC_KEY = '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'; // zmień na własne hasło

function checkPassword() {
  const pass = document.getElementById('login-password').value;
  const err  = document.getElementById('login-error');
  if (pass === APP_PASSWORD) {
    sessionStorage.setItem('transport-logged', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    initApp();
  } else {
    err.textContent = 'Nieprawidłowe hasło.';
  }
}

function logout() {
  sessionStorage.removeItem('transport-logged');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display  = 'none';
}

// Sprawdź czy już zalogowany
document.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('transport-logged') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display  = 'flex';
    initApp();
  }
});

// ── DB INIT ───────────────────────────────────────────────
async function initApp() {
  await ensureTables();
  await loadAll();
  showView('dashboard');
  setupRealtime();
}

async function ensureTables() {
  // no-op
}

async function loadAll() {
  setSync(true);
  try {
    const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), ms));

    const fetchData = Promise.all([
      sb.from('zlecenia').select('*').order('created_at', { ascending: false }),
      sb.from('kierowcy').select('*').order('nazwa'),
      sb.from('flota').select('*').order('rejestracja'),
      sb.from('dokumenty').select('*').order('created_at', { ascending: false }),
      sb.from('podwykonawcy_zlecenia').select('*').order('created_at', { ascending: false }),
    ]);

    const [z, k, f, d, pw] = await Promise.race([fetchData, timeout(8000)]);

    if (z.error) throw new Error('zlecenia: ' + z.error.message);
    if (k.error) throw new Error('kierowcy: ' + k.error.message);
    if (f.error) throw new Error('flota: ' + f.error.message);
    if (d.error) throw new Error('dokumenty: ' + d.error.message);
    if (pw.error) throw new Error('podwykonawcy: ' + pw.error.message);

    orders  = z.data || [];
    drivers = k.data || [];
    cars    = f.data || [];
    docs    = d.data || [];
    podw    = pw.data || [];
  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div style="background:#FCEBEB;border:1px solid #f09595;border-radius:12px;padding:24px;margin-bottom:16px;color:#791F1F">
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">Błąd połączenia z bazą danych</div>
        <div style="font-size:13px;margin-bottom:12px">${e.message}</div>
        <div style="font-size:12px;opacity:.8">Sprawdź czy uruchomiłeś SQL z politykami dostępu w Supabase → SQL Editor</div>
      </div>
      <div style="background:#EAF3DE;border:1px solid #97C459;border-radius:12px;padding:20px;font-size:13px">
        <div style="font-weight:600;margin-bottom:10px">Uruchom ten SQL w Supabase → SQL Editor:</div>
        <pre style="background:#fff;padding:12px;border-radius:8px;font-size:12px;overflow-x:auto">drop policy if exists "dostep" on zlecenia;
drop policy if exists "dostep" on kierowcy;
drop policy if exists "dostep" on flota;
drop policy if exists "dostep" on dokumenty;

create policy "dostep" on zlecenia for all to anon, authenticated using (true) with check (true);
create policy "dostep" on kierowcy for all to anon, authenticated using (true) with check (true);
create policy "dostep" on flota for all to anon, authenticated using (true) with check (true);
create policy "dostep" on dokumenty for all to anon, authenticated using (true) with check (true);</pre>
        <button class="btn btn-primary" style="margin-top:12px" onclick="location.reload()">Odśwież po uruchomieniu SQL</button>
      </div>`;
    setSync(false);
    return;
  }
  setSync(false);
}

function setupRealtime() {
  // Realtime przez polling co 30 sekund
  setInterval(async () => {
    await loadAll();
    renderView(currentView);
  }, 30000);

  // Odświeżaj też gdy użytkownik wraca do karty
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible') {
      await loadAll();
      renderView(currentView);
    }
  });
}

function setSync(loading) {
  const dot  = document.getElementById('sync-dot');
  const text = document.getElementById('sync-text');
  if (loading) { dot.className = 'sync-indicator offline'; text.textContent = 'synchronizacja...'; }
  else         { dot.className = 'sync-indicator';          text.textContent = 'połączono'; }
}

// ── NAVIGATION ────────────────────────────────────────────
function showView(v) {
  currentView = v;
  document.querySelectorAll('.nav').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav').forEach(n => {
    if (n.getAttribute('onclick') && n.getAttribute('onclick').includes("'" + v + "'")) n.classList.add('active');
  });
  // sync mobile action button
  const mobileActs = document.getElementById('topbar-actions-mobile');
  if (mobileActs) mobileActs.innerHTML = document.getElementById('topbar-actions').innerHTML;
  const titles = { dashboard:'Dashboard', zlecenia:'Zlecenia', kierowcy:'Kierowcy', flota:'Flota', dokumenty:'Dokumenty', raporty:'Raporty', podwykonawcy:'Zlecenia zewnętrzne', rozliczenia:'Prowizja spedytora', kalkulator:'Kalkulator dodatku paliwowego' };
  document.getElementById('view-title').textContent = titles[v] || v;
  const acts = document.getElementById('topbar-actions');
  const btns = {
    zlecenia:  '<button class="btn" onclick="exportExcel()">Export Excel</button><button class="btn btn-primary" onclick="openOrderModal()">+ Nowe zlecenie</button>',
    dashboard: '<button class="btn btn-primary" onclick="openOrderModal()">+ Nowe zlecenie</button>',
    kierowcy:  '<button class="btn btn-primary" onclick="openDriverModal()">+ Kierowca</button>',
    flota:     '<button class="btn btn-primary" onclick="openCarModal()">+ Auto</button>',
    dokumenty: '<button class="btn btn-primary" onclick="openDocModal()">+ Dokument</button>',
    podwykonawcy: '<button class="btn btn-primary" onclick="openPodwModal()">+ Nowe zlecenie zewnętrzne</button>',
    raporty: '<button class="btn" onclick="exportExcelRaport()">Export Excel</button>',
    kalkulator: '',
    rozliczenia: '',
  };
  acts.innerHTML = btns[v] || '';
  renderView(v);
}

function renderView(v) {
  const c = document.getElementById('main-content');
  if      (v === 'dashboard') c.innerHTML = renderDashboard();
  else if (v === 'zlecenia')  c.innerHTML = renderZlecenia();
  else if (v === 'kierowcy')  c.innerHTML = renderKierowcy();
  else if (v === 'flota')     c.innerHTML = renderFlota();
  else if (v === 'dokumenty') c.innerHTML = renderDokumenty();
  else if (v === 'raporty')   c.innerHTML = renderRaporty();
  else if (v === 'podwykonawcy') c.innerHTML = renderPodwykonawcy();
  else if (v === 'rozliczenia') c.innerHTML = renderRozliczenia();
  else if (v === 'kalkulator') { c.innerHTML = renderKalkulator(); setTimeout(kalkuluj, 0); }
}

function orderRow(o, showDostawa=false) {
  return `<tr onclick="showDetail('${o.id}')">
    <td style="font-family:monospace;color:var(--text3);font-size:12px">${o.numer||o.id?.slice(0,8)}</td>

function filterOrders() {
  const q = (document.getElementById('search-input')?.value||'').toLowerCase();
  const st = document.getElementById('filter-status')?.value||'';
  const filtered = orders.filter(o => {
    const match = !q || [o.skad,o.dokad,o.klient,o.kierowca].some(v => (v||'').toLowerCase().includes(q));
    const statusMatch = !st || o.status === st;
    return match && statusMatch;
  });
  const tbody = document.getElementById('orders-tbody');
  if (tbody) tbody.innerHTML = filtered.map(o => orderRow(o, true)).join('');
}

function renderFlota() {
  var today = new Date();
  var warn30 = new Date(); warn30.setDate(today.getDate() + 30);
  function dateStatus(ds) {
    if (!ds) return null;
    var d = new Date(ds);
    if (d < today) return 'expired';
    if (d <= warn30) return 'soon';
    return 'ok';
  }
  function dateFmt(ds) { return ds ? new Date(ds).toLocaleDateString('pl-PL') : '-'; }
  function dateBadge(ds) {
    if (!ds) return '-';
    var s = dateStatus(ds), f = dateFmt(ds);
    if (s === 'expired') return '<span class="badge b-red">' + f + ' PRZETERMINOWANY</span>';
    if (s === 'soon') return '<span class="badge b-amber">' + f + ' wkrotce</span>';
    return '<span style="font-size:12px;color:var(--text2)">' + f + '</span>';
  }
  var alertHtml = '';
  var alertCars = cars.filter(function(x) {
    var p=dateStatus(x.data_przegladu), u=dateStatus(x.data_ubezpieczenia);
    return p==='expired'||p==='soon'||u==='expired'||u==='soon';
  });
  if (alertCars.length) {
    var msgs = alertCars.map(function(x) {
      var parts=[], p=dateStatus(x.data_przegladu), u=dateStatus(x.data_ubezpieczenia);
      if(p==='expired') parts.push(x.rejestracja+': przeglad PRZETERMINOWANY');
      else if(p==='soon') parts.push(x.rejestracja+': przeglad '+dateFmt(x.data_przegladu));
      if(u==='expired') parts.push(x.rejestracja+': ubezp. PRZETERMINOWANE');
      else if(u==='soon') parts.push(x.rejestracja+': ubezp. '+dateFmt(x.data_ubezpieczenia));
      return parts.join(', ');
    }).join(' | ');
    alertHtml='<div style="background:var(--color-background-warning);border:1px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--color-text-warning)"><strong>Uwaga!</strong> '+msgs+'</div>';
  }
  var rows='';
  for(var i=0;i<cars.length;i++){
    var car=cars[i];
    var cnt=orders.filter(function(o){return o.auto===car.rejestracja+' — '+car.model;}).length;
    var ps=dateStatus(car.data_przegladu), us=dateStatus(car.data_ubezpieczenia);
    var rowBg=(ps==='expired'||us==='expired')?'background:var(--red-bg)':(ps==='soon'||us==='soon')?'background:var(--amber-bg)':'';
    var sb=car.status==='W trasie'?'b-blue':car.status==='Serwis'?'b-amber':'b-green';
    rows+='<tr data-id="'+car.id+'" style="'+rowBg+';cursor:pointer"><td><strong>'+car.rejestracja+'</strong></td><td>'+car.model+'</td><td style="color:var(--text2)">'+(car.rok||'-')+'</td><td><span class="badge '+sb+'">'+car.status+'</span></td><td>'+dateBadge(car.data_przegladu)+'</td><td>'+dateBadge(car.data_ubezpieczenia)+'</td><td>'+cnt+'</td></tr>';
  }
  var html=alertHtml+'<div class="card" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table id="flota-table"><thead><tr><th>Rejestracja</th><th>Marka i model</th><th style="width:60px">Rok</th><th style="width:90px">Status</th><th style="width:130px">Przeglad</th><th style="width:130px">Ubezpieczenie</th><th style="width:60px">Zlecenia</th></tr></thead><tbody>'+rows+'</tbody></table>'+(!cars.length?'<div class="empty">Brak aut we flocie</div>':'')+'</div></div>';
  setTimeout(function(){
    var tbl=document.getElementById('flota-table');
    if(tbl) tbl.addEventListener('click',function(e){
      var tr=e.target.closest('tr[data-id]');
      if(tr) openCarModal(tr.getAttribute('data-id'));
    });
  },50);
  return html;
}

function renderRaporty() {
  const przychodyWgR = {};
  orders.filter(o=>o.status!=='Anulowane').forEach(o => {
    const w = o.waluta || 'PLN';
    przychodyWgR[w] = (przychodyWgR[w]||0) + (+o.fracht||0);
  });
  const prz = Object.values(przychodyWgR).reduce((s,v)=>s+v,0);
  const przHtmlR = Object.entries(przychodyWgR).length
    ? Object.entries(przychodyWgR).map(([w,v])=>`<span style="margin-right:12px"><span style="font-size:18px;font-weight:600;color:var(--green-text)">${v.toLocaleString('pl-PL')}</span> <span style="font-size:11px;color:var(--text3)">${w}</span></span>`).join('')
    : '<span style="font-size:22px;font-weight:600">0</span>';
  const dst = orders.filter(o=>o.status==='Dostarczone').length;
  const sr  = orders.length ? Math.round(prz/orders.length) : 0;
  const eff = orders.length ? Math.round(dst/orders.length*100) : 0;
  return `
  <div class="metrics">
    <div class="metric" style="grid-column:1/-1"><div class="metric-label">Łączny przychód</div><div style="margin-top:4px">${przHtmlR}</div></div>
    <div class="metric"><div class="metric-label">Liczba zleceń</div><div class="metric-val">${orders.length}</div></div>
    <div class="metric"><div class="metric-label">Śr. fracht / zlecenie</div><div class="metric-val blue">${sr.toLocaleString('pl-PL')} zł</div></div>
    <div class="metric"><div class="metric-label">Skuteczność dostaw</div><div class="metric-val amber">${eff}%</div></div>
  </div>
  <div class="two-col">
    <div class="card">
      <div class="card-title">Statusy zleceń</div>
      ${['Nowe','W trasie','Oczekuje','Dostarczone','Anulowane'].map(s=>{
        const n = orders.filter(o=>o.status===s).length;
        const pct = orders.length ? Math.round(n/orders.length*100) : 0;
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
          <span class="badge ${STATUS_MAP[s]||'b-gray'}" style="width:90px;text-align:center">${s}</span>
          <div style="flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden">
            <div style="width:${pct}%;height:100%;background:var(--blue);border-radius:3px"></div>
          </div>
          <span style="font-size:12px;font-weight:600;min-width:20px;text-align:right">${n}</span>
        </div>`;
      }).join('')}
    </div>
    <div class="card">
      <div class="card-title">Top kierowcy wg zleceń</div>
      ${drivers.map(d=>({...d,cnt:orders.filter(o=>o.kierowca===d.nazwa).length}))
        .sort((a,b)=>b.cnt-a.cnt).slice(0,7).map(d=>`
        <div class="driver-row">
          <div class="avatar">${initials(d.nazwa)}</div>
          <div style="flex:1;font-size:13px">${d.nazwa}</div>
          <span style="font-size:14px;font-weight:600">${d.cnt}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

async function saveOrder() {
  let savedId = null;
  const skad  = document.getElementById('f-skad').value.trim();
  const dokad = document.getElementById('f-dokad').value.trim();
  if (!skad || !dokad) { showToast('Uzupełnij pola Skąd i Dokąd.', true); return; }
  const payload = {
    skad, dokad,
    klient:         document.getElementById('f-klient').value.trim(),
    status:         document.getElementById('f-status').value,
    kierowca:       document.getElementById('f-kierowca').value,
    kierowca2:      document.getElementById('f-kierowca2')?.value||'',
    auto:           document.getElementById('f-auto').value,
    data_zaladunek: document.getElementById('f-zaladunek').value || null,
    data_dostawa:   document.getElementById('f-dostawa').value || null,
    fracht:         parseFloat(document.getElementById('f-fracht').value) || 0,
    kilometry:      parseFloat(document.getElementById('f-km').value) || 0,
    waluta:         (document.getElementById('f-waluta')||{value:'PLN'}).value,
    ref:            document.getElementById('f-ref').value.trim(),
    uwagi:          document.getElementById('f-uwagi').value.trim(),
    numer:          (document.getElementById('f-numer')||{value:''}).value.trim() || undefined,
    
  };
  if (!editingId) {
    delete payload.numer_wlasny;
    const { data: insData, error } = await sb.from('zlecenia').insert(payload).select('id').single();
    if (error) { showToast('Błąd zapisu: ' + error.message, true); return; }
    savedId = insData?.id;
    await sendNewOrderEmail(payload);
  } else {
    delete payload.numer_wlasny; const { error } = await sb.from('zlecenia').update(payload).eq('id', editingId);
    if (error) { showToast('Błąd aktualizacji: ' + error.message, true); return; }
    savedId = editingId;
  }
  // Upload pliku jeśli wybrany
  const plikInput = document.getElementById('f-plik');
  if (plikInput && plikInput.files && plikInput.files[0]) {
    const plik = plikInput.files[0];
    const ext = plik.name.split('.').pop();
    const sciezka = 'zlecenia/' + (savedId || editingId) + '.' + ext;
    const { error: upErr } = await sb.storage.from('zlecenia-pliki').upload(sciezka, plik, { upsert: true });
    if (!upErr) {
      const { data: urlData } = sb.storage.from('zlecenia-pliki').getPublicUrl(sciezka);
      await sb.from('zlecenia').update({ plik_url: urlData.publicUrl }).eq('id', savedId || editingId);
    } else {
      showToast('Błąd uploadu: ' + upErr.message, true);
    }
  }
  // Auto-update driver status based on order status
  const orderStatus = payload.status;
  const k1 = payload.kierowca;
  const k2 = payload.kierowca2;
  if (k1) {
    const newDriverStatus = orderStatus === 'W trasie' ? 'W trasie' : orderStatus === 'Dostarczone' || orderStatus === 'Anulowane' ? 'Dostępny' : null;
    if (newDriverStatus) {
      const d1 = drivers.find(d => d.nazwa === k1);
      if (d1) await sb.from('kierowcy').update({ status: newDriverStatus }).eq('id', d1.id);
    }
  }
  if (k2) {
    const newDriverStatus2 = orderStatus === 'W trasie' ? 'W trasie' : orderStatus === 'Dostarczone' || orderStatus === 'Anulowane' ? 'Dostępny' : null;
    if (newDriverStatus2) {
      const d2 = drivers.find(d => d.nazwa === k2);
      if (d2) await sb.from('kierowcy').update({ status: newDriverStatus2 }).eq('id', d2.id);
    }
  }
  closeModal();
  showToast(editingId ? 'Zlecenie zaktualizowane ✓' : 'Zlecenie dodane ✓');
  await loadAll(); renderView(currentView);
}

function nextPodwNumer() {
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const yyyy = now.getFullYear();
  const existing = podw.filter(p => {
    const m = (p.numer||'').match(/LTE (\d+)\/(\d+)\/(\d+)/);
    return m && m[2] === mm && m[3] === String(yyyy);
  });
  const nextNum = String(existing.length + 1).padStart(3,'0');
  return `LTE ${nextNum}/${mm}/${yyyy}`;
}

    <thead><tr>
      <th style="width:130px">Numer</th>

}

async function savePodw() {
  const nazwa = document.getElementById('pw-nazwa').value.trim();
  const skad  = document.getElementById('pw-skad').value.trim();
  const dokad = document.getElementById('pw-dokad').value.trim();
  if (!nazwa||!skad||!dokad) { showToast('Uzupełnij zleceniobiorcę, skąd i dokąd.', true); return; }
  const payload = {
    numer:               document.getElementById('pw-numer').value.trim(),
    status:              document.getElementById('pw-status').value,
    zleceniobiorca_nazwa:document.getElementById('pw-nazwa').value.trim(),
    zleceniobiorca_adres:document.getElementById('pw-adres').value.trim(),
    zleceniobiorca_nip:  document.getElementById('pw-nip').value.trim(),
    kierowca:            document.getElementById('pw-kierowca').value.trim(),
    kierowca_tel:        document.getElementById('pw-kierowca-tel').value.trim(),
    auto:                document.getElementById('pw-auto').value.trim(),
    skad, skad_adres:    document.getElementById('pw-skad-adres').value.trim(),
    skad_data:           document.getElementById('pw-skad-data').value||null,
    skad_godz:           document.getElementById('pw-skad-godz').value.trim(),
    dokad, dokad_adres:  document.getElementById('pw-dokad-adres').value.trim(),
    dokad_data:          document.getElementById('pw-dokad-data').value||null,
    dokad_godz:          document.getElementById('pw-dokad-godz').value.trim(),
    fracht:              parseFloat(document.getElementById('pw-fracht').value)||0,
    kilometry:           parseFloat(document.getElementById('pw-km').value)||0,
    waluta:              document.getElementById('pw-waluta').value,
    platnosc_dni:        parseInt(document.getElementById('pw-platnosc').value)||30,
    referencje:          document.getElementById('pw-ref').value.trim(),
    uwagi:               document.getElementById('pw-uwagi').value.trim(),
  };
  const pwId = (document.getElementById('pw-id')||{value:''}).value;
  let err;
  if (!pwId) { const r = await sb.from('podwykonawcy_zlecenia').insert(payload); err = r.error; }
  else { const r = await sb.from('podwykonawcy_zlecenia').update(payload).eq('id', pwId); err = r.error; }
  if (err) { showToast('Błąd: ' + err.message, true); return; }
  closeModal(); showToast('Zlecenie zapisane ✓');
  await loadAll(); renderView('podwykonawcy');
}

async function deletePodw(id) {

}

function exportPodwPDF(id) {
  const p = id ? podw.find(x=>x.id===id) : null;
  if (!p) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'mm', format:'a4' });
  const W=210, L=20, R=190, TW=170;

  function pl(s){
    return (s||'').toString()
      .replace(/ą/g,'a').replace(/Ą/g,'A')
      .replace(/ć/g,'c').replace(/Ć/g,'C')
      .replace(/ę/g,'e').replace(/Ę/g,'E')
      .replace(/ł/g,'l').replace(/Ł/g,'L')
      .replace(/ń/g,'n').replace(/Ń/g,'N')
      .replace(/ó/g,'o').replace(/Ó/g,'O')
      .replace(/ś/g,'s').replace(/Ś/g,'S')
      .replace(/ź/g,'z').replace(/Ź/g,'Z')
      .replace(/ż/g,'z').replace(/Ż/g,'Z');
  }

  function txt(s, x, y, maxW, opts){
    opts = opts||{};
    doc.setFont('helvetica', opts.bold?'bold':'normal');
    doc.setFontSize(opts.size||8.5);
    doc.setTextColor(...(opts.color||[20,20,20]));
    const lines = doc.splitTextToSize(pl(s), maxW||TW);
    doc.text(lines, x, y, {align: opts.align||'left'});
    return lines.length;
  }

  // ── NAGLOWEK ──
  // Logo LTE
  doc.setDrawColor(100); doc.setLineWidth(0.5);
  doc.circle(L+9, 16, 10);
  doc.setFontSize(22); doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20);
  doc.text('LTE', L+2, 18);
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
  doc.text('LOGISTIC', L+14, 13);
  doc.text('Sp. z o.o.', L+14, 18);

  // Data
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(60,60,60);
  doc.text('Data wystawienia : '+new Date().toLocaleDateString('pl-PL'), R, 10, {align:'right'});

  // Tytul
  doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20);
  doc.text('ZLECENIE TRANSPORTOWE', W/2, 20, {align:'center'});
  doc.setFontSize(12);
  doc.text(pl(p.numer), W/2, 27, {align:'center'});

  // Linia
  doc.setDrawColor(20,20,20); doc.setLineWidth(0.6);
  doc.line(L, 31, R, 31);

  let y = 37;

  // ── STRONY ──
  const hw = (TW/2) - 2;
  doc.setDrawColor(180); doc.setLineWidth(0.3);
  doc.rect(L, y, hw, 36);
  doc.rect(L+hw+4, y, hw, 36);

  // Naglowki kolumn
  doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(20,20,20);
  doc.text('ZLECENIODAWCA :', L+3, y+5);
  doc.text('ZLECENIOBIORCA :', L+hw+7, y+5);
  doc.line(L, y+7, L+hw, y+7);
  doc.line(L+hw+4, y+7, L+hw+4+hw, y+7);

  // Lewa kolumna
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  doc.text('LTE LOGISTIC SP. Z O.O.', L+3, y+13);
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  doc.text('KIELECKA 41A/8', L+3, y+18);
  doc.text('PL 02-530 WARSZAWA', L+3, y+23);
  doc.text('VAT ID 5213966752', L+3, y+28);

  // Prawa kolumna
  let ry = y+12;
  if(p.zleceniobiorca_nazwa){
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    doc.text(pl(p.zleceniobiorca_nazwa), L+hw+7, ry); ry+=5;
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  }
  if(p.zleceniobiorca_adres){
    const ls=doc.splitTextToSize(pl(p.zleceniobiorca_adres), hw-8);
    doc.text(ls, L+hw+7, ry); ry+=ls.length*4.2;
  }
  if(p.zleceniobiorca_nip){ doc.text('Nip:'+pl(p.zleceniobiorca_nip), L+hw+7, ry); }
  y += 42;

  // ── AUTO / KIEROWCA ──
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(20,20,20);
  if(p.auto){ doc.text('NUMERY AUTA : '+pl(p.auto), L, y); y+=5.5; }
  if(p.kierowca){ doc.text('KIEROWCA: '+pl(p.kierowca)+(p.kierowca_tel?' tel: '+pl(p.kierowca_tel):''), L, y); y+=5.5; }
  y+=3;

  // ── TABELA TRASA ──
  doc.setFillColor(245,245,245);
  doc.rect(L, y, TW, 8, 'F');
  doc.setDrawColor(180); doc.rect(L, y, TW, 8);
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(20,20,20);
  doc.text('DANE DOTYCZACE ZALADUNKU/ROZLADUNKU:', W/2, y+5.5, {align:'center'});
  y+=8;

  const rH = 38;
  doc.setDrawColor(180); doc.rect(L, y, hw, rH); doc.rect(L+hw+4, y, hw, rH);

  // Zaladunek
  let zy = y+6;
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  const zlLabel = 'ZALADUNEK'+(p.skad_data?' '+pl(p.skad_data):'')+(p.skad_godz?' '+pl(p.skad_godz):'');
  doc.text(zlLabel, L+3, zy); zy+=5; doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  if(p.skad){ doc.text(pl(p.skad), L+3, zy); zy+=4.5; }
  if(p.skad_adres){ const ls=doc.splitTextToSize(pl(p.skad_adres), hw-6); doc.text(ls,L+3,zy); zy+=ls.length*4.2; }
  if(p.referencje){ doc.setTextColor(80); doc.text('Referencje: '+pl(p.referencje), L+3, zy); doc.setTextColor(20,20,20); }

  // Rozladunek
  let rzy2 = y+6;
  doc.setFont('helvetica','bold'); doc.setFontSize(9);
  const rzLabel = 'ROZLADUNEK'+(p.dokad_data?' '+pl(p.dokad_data):'')+(p.dokad_godz?' '+pl(p.dokad_godz):'');
  doc.text(rzLabel, L+hw+7, rzy2); rzy2+=5; doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  if(p.dokad){ doc.text(pl(p.dokad), L+hw+7, rzy2); rzy2+=4.5; }
  if(p.dokad_adres){ const ld=doc.splitTextToSize(pl(p.dokad_adres), hw-8); doc.text(ld, L+hw+7, rzy2); }
  y += rH+5;

  // ── UWAGI ──
  if(p.uwagi){
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(20,20,20);
    const ul=doc.splitTextToSize(pl(p.uwagi), TW);
    doc.text(ul, L, y);
    y += ul.length*4.5+5;
  }

  // ── WARUNKI FINANSOWE ──
  doc.setDrawColor(180); doc.line(L, y, R, y); y+=6;
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(20,20,20);
  doc.text('Warunki Finansowe', L, y); y+=5;
  doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
  doc.text('Cena All In Netto: '+(+p.fracht||0).toLocaleString('pl-PL')+' '+(p.waluta||'EUR')+' + 23% VAT', L+3, y); y+=4.5;
  doc.text('Termin platnosci: '+(p.platnosc_dni||30)+' dni po otrzymaniu kompletu dokumentow pocztą.', L+3, y); y+=7;

  // ── OGOLNE WARUNKI ──
  doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Ogolne warunki zlecenia', L, y); y+=5;

  function addLine(s, size, bold, extra){
    if(!s){y+=(extra||2);return;}
    doc.setFont('helvetica', bold?'bold':'normal');
    doc.setFontSize(size||8);
    doc.setTextColor(20,20,20);
    const ls = doc.splitTextToSize(pl(s), TW);
    if(y + ls.length*3.8 > 278){
      doc.addPage(); y=15;
      doc.setFont('helvetica','bold'); doc.setFontSize(8);
      doc.text(pl(p.numer), L, 10);
      doc.setFont('helvetica','normal');
    }
    doc.text(ls, L, y);
    y += ls.length*3.8 + (extra||0.5);
  }

  addLine('Dane do korespondencji:', 8, true);
  addLine('LTE LOGISTIC, UL. SLOWACKIEGO 11, 62-700 TUREK, NIP: PL5213966752', 8, false);
  addLine('');
  addLine('Dane do fakturowania:', 8, true);
  addLine('LTE LOGISTIC SPOLKA Z OGRANICZONA ODPOWIEDZIALNOSCIA, Kielecka 41A/8, 02-530 Warszawa, NIP: PL5213966752', 8, false);
  addLine('');
  addLine('SKONTO - Skonto nalezy uwzglednic jako RABAT na fakturze. Faktura musi zawierac pierwotna wartosc frachtu.', 8, false);
  addLine('3-5 dni od otrzymania oryginalow pocztą = 3%', 8, false);
  addLine('SKONTO MOZLIWE TYLKO PO WCZESNIEJSZYM POTWIERDZENIU DROGA MAILOWA.', 8, false);
  addLine('');
  addLine('INFORMACJE NA TEMAT PLATNOSCI:', 8, true);
  addLine('1. Fakture (EUR i PLN) nalezy wystawic w miesiacu wykonania uslugi (miesiac rozladunku). Podatek VAT i fracht EUR przeliczyc na PLN wg kursu NBP z dnia poprzedzajacego rozladunek. PROSIMY NIE WYSTAWIAC FAKTUR ZBIORCZYCH!!', 8, false);
  addLine('2. Forma platnosci PRZELEW w terminie '+(p.platnosc_dni||30)+' dni od prawidlowo wystawionej faktury z kompletem dokumentow. Po rozladunku wyslac zdjecie CMR na mail z numerem zlecenia w temacie. Brak zdjecia = nota obciazeniowa do 50 EUR.', 8, false);
  addLine('');
  addLine('WARUNEK PLATNOSCI - komplet dokumentow:', 8, true);
  addLine('- oryginal faktury z numerem zlecenia, wystawionej w dwoch walutach (EUR i PLN);', 8, false);
  addLine('- 2 egzemplarze CMR z pieczatka, podpisami i datami potwierdzajacymi nadanie i odbior ladunku;', 8, false);
  addLine('- inne dokumenty dolaczone do transportu (lieferschein, packing list itp.);', 8, false);
  addLine('- wypelniony dokument ATTESTATION.', 8, false);
  addLine('');
  addLine('3. LTE Logistic zastrzega sobie prawo wstrzymania platnosci w przypadku uszkodzen lub uchybien w ilosci towaru do czasu wyjasnienia sprawy.', 8, false);

// ── PROWIZJA SPEDYTORA ──────────────────────────────────────
function calcProwizja(fracht, km, waluta) {
  if (!km || km <= 0) return null;
  const stawka = fracht / km;
  const prog = 1.3;
  let prowizja = 0;
  let opis = '';

  if (stawka <= prog) {
    prowizja = fracht * 0.04;
    opis = `${fracht.toFixed(2)} ${waluta} × 4% = ${prowizja.toFixed(2)} ${waluta}`;
  } else {
    const bazowa = km * prog;
    const nadwyzka = fracht - bazowa;
    const pBazowa = bazowa * 0.04;
    const pNadwyzka = nadwyzka / 2;
    prowizja = pBazowa + pNadwyzka;
    opis = `${km} km × 1.3 = ${bazowa.toFixed(2)} ${waluta} (4% = ${pBazowa.toFixed(2)}) + nadwyżka ${nadwyzka.toFixed(2)} ${waluta} ÷ 2 = ${pNadwyzka.toFixed(2)} ${waluta}`;
  }
  return { stawka, prowizja, opis };
}

function renderRozliczenia() {
  const zlWithKm = [...orders, ...podw].filter(o => o.kilometry > 0 && o.fracht > 0 && o.status !== 'Anulowane');

  if (!zlWithKm.length) return `
    <div class="card">
      <div class="card-title">Prowizja spedytora</div>
      <div class="empty">Brak zleceń z podanymi kilometrami. Dodaj kilometry do zleceń aby wyliczyć prowizję.</div>
    </div>`;

  // Summary
  let totalProwizja = {};
  zlWithKm.forEach(o => {
    const w = o.waluta || 'EUR';
    const r = calcProwizja(+o.fracht, +o.kilometry, w);
    if (r) totalProwizja[w] = (totalProwizja[w]||0) + r.prowizja;
  });

  const summaryHtml = Object.entries(totalProwizja).map(([w,v]) =>
    `<div class="metric">
      <div class="metric-label">Prowizja łączna (${w})</div>
      <div class="metric-val amber">${v.toFixed(2)} ${w}</div>
    </div>`
  ).join('');

  const rowsHtml = zlWithKm.map(o => {
    const w = o.waluta || 'EUR';
    const r = calcProwizja(+o.fracht, +o.kilometry, w);
    if (!r) return '';
    const prog = r.stawka <= 1.3;
    return `<tr>
      <td style="font-family:monospace;font-size:11px;color:var(--text3)">${o.numer||o.id?.slice(0,8)||'-'}</td>
      <td>${(o.skad||'')} → ${(o.dokad||'')}</td>
      <td style="text-align:right">${Math.round(+o.kilometry).toLocaleString('pl-PL')} km</td>
      <td style="text-align:right">${(+o.fracht).toLocaleString('pl-PL')} ${w}</td>
      <td style="text-align:right">
        <span class="badge ${prog?'b-green':'b-amber'}">${r.stawka.toFixed(2)} ${w}/km</span>
      </td>
      <td style="text-align:right;font-weight:500">${r.prowizja.toFixed(2)} ${w}</td>
      <td style="font-size:11px;color:var(--text2);max-width:200px;white-space:normal">${r.opis}</td>
    </tr>`;
  }).join('');

  return `
  <div style="margin-bottom:16px">
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px;padding:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)">
      <strong>Zasady prowizji:</strong> do 1.3 ${' '}/km → 4% całego frachtu &nbsp;|&nbsp; powyżej 1.3/km → (km × 1.3) × 4% + nadwyżka ÷ 2
    </div>
  </div>
  <div class="metrics" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:16px">
    ${summaryHtml}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div style="overflow-x:auto"><table>
      <thead><tr>
        <th style="width:100px">Nr zlecenia</th>
        <th>Trasa</th>
        <th style="width:80px;text-align:right">km</th>
        <th style="width:90px;text-align:right">Fracht</th>
        <th style="width:90px;text-align:right">Stawka/km</th>
        <th style="width:90px;text-align:right">Prowizja</th>
        <th style="width:220px">Obliczenie</th>
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table></div>
  </div>`;
}

    var str = (s||'').toString()
      .replace(/ą/g,'a').replace(/Ą/g,'A')
      .replace(/ć/g,'c').replace(/Ć/g,'C')
      .replace(/ę/g,'e').replace(/Ę/g,'E')
      .replace(/ł/g,'l').replace(/Ł/g,'L')
      .replace(/ń/g,'n').replace(/Ń/g,'N')

function kalkuluj() {
  const cenaBaza = parseFloat(document.getElementById('k-cena-baza')?.value) || 0;
  const dieselBaza = parseFloat(document.getElementById('k-diesel-baza')?.value) || 1;
  const udzial = (parseFloat(document.getElementById('k-udzial')?.value) || 35) / 100;
  const dieselAkt = parseFloat(document.getElementById('k-diesel-akt')?.value) || 0;
  const cenaRynek = parseFloat(document.getElementById('k-cena-rynek')?.value) || 0;

  const npar = cenaBaza * (1 - udzial);
  const parBaza = cenaBaza * udzial;
  const wspolczynnik = dieselAkt / dieselBaza;
  const parAkt = parBaza * wspolczynnik;
  const cenaObl = npar + parAkt;
  const zmianaPct = ((cenaObl - cenaBaza) / cenaBaza * 100);
  const zmianaEur = cenaObl - cenaBaza;
  const dieselZmPct = ((dieselAkt - dieselBaza) / dieselBaza * 100);
  const odchRynek = cenaRynek ? cenaObl - cenaRynek : null;

  const fmt = v => v.toFixed(2) + ' €';
  const fmtPct = v => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

  const el = id => document.getElementById(id);
  if (!el('k-r-cena')) return;

  el('k-r-cena').textContent = fmt(cenaObl);
  el('k-r-zmiana').textContent = fmtPct(zmianaPct);
  el('k-r-zmiana').style.color = zmianaPct > 0 ? 'var(--amber-text)' : 'var(--green-text)';
  el('k-r-diesel').textContent = fmtPct(dieselZmPct);
  el('k-r-diesel').style.color = dieselZmPct > 0 ? 'var(--amber-text)' : 'var(--green-text)';
  el('k-r-npar').textContent = fmt(npar);
  el('k-r-par').textContent = fmt(parAkt);
  el('k-r-rynek').textContent = odchRynek !== null ? (odchRynek >= 0 ? '+' : '') + fmt(odchRynek) : '—';
  if (odchRynek !== null) el('k-r-rynek').style.color = odchRynek > 0 ? 'var(--amber-text)' : 'var(--green-text)';

  // Tabela scenariuszy
  const tbody = el('k-tabela-body');
  if (!tbody) return;
  const scenariusze = [3.5, 4.0, 4.5, 4.6, 5.0, 5.5, 6.0, 6.5, 6.76, 7.0, 7.5, 8.0];
  tbody.innerHTML = scenariusze.map(diesel => {
    const c = cenaBaza * (1 - udzial) + cenaBaza * udzial * diesel / dieselBaza;
    const dp = (c - cenaBaza) / cenaBaza * 100;
    const de = c - cenaBaza;
    const isAkt = Math.abs(diesel - dieselAkt) < 0.01;
    const isBaza = Math.abs(diesel - dieselBaza) < 0.01;
    const bg = isAkt ? 'background:var(--blue-bg)' : isBaza ? 'background:var(--green-bg)' : '';
    return `<tr style="${bg}">
      <td>${diesel.toFixed(2)} PLN/l${isAkt?' ◀ aktualny':''}${isBaza?' ◀ baza':''}</td>
      <td style="font-weight:500">${c.toFixed(2)} €</td>
      <td style="color:${dp>0?'var(--amber-text)':'var(--green-text)'}">${(dp>=0?'+':'')}${dp.toFixed(1)}%</td>
      <td style="color:${de>0?'var(--amber-text)':'var(--green-text)'}">${(de>=0?'+':'')}${de.toFixed(2)} €</td>
    </tr>`;
  }).join('');
}

function fileToBase64(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result.split(',')[1]); };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
